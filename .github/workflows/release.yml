name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  build-package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cmake_extra: ""
          - os: ubuntu-24.04-arm
            arch: arm64
            cmake_extra: ""
          - os: macos-latest
            arch: universal
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -S tool -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build

      - name: Package
        run: cd build && cpack

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}-${{ matrix.arch }}
          path: build/gv2fsm-*

  release:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
